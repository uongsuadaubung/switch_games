name: Release

on:
  release:
    types: [published]   # Trigger khi publish release trên GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # cần để tạo release và upload artifacts
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Auto Bump Version from Tag
        shell: bash
        run: |
          # refs/tags/v0.5.5 -> 0.5.5
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Bumping to version $VERSION"
          node scripts/bump-version.mjs $VERSION

      - name: Commit & Push changes
        shell: bash
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: bump version to ${{ github.event.release.tag_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build
        run: npm run tauri build

      - name: Upload exe to existing release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} `
            "src-tauri/target/release/switch-games.exe" `
            --clobber

  deploy-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # cần để push vào branch web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages
        run: npm run build
        env:
          DEPLOY_TARGET: gh-pages

      - name: Deploy to branch web
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: web
          publish_dir: ./build
          force_orphan: true          # giữ history gọn — chỉ 1 commit mỗi lần deploy
          user_name: uongsuadaubung
          user_email: manhkien13041997@gmail.com
          commit_message: "🚀 Deploy - ${{ github.event.release.tag_name }}"
