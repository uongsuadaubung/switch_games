name: Release

on:
  push:
    tags:
      - "v*" # Trigger khi push tag dạng v1.0.0, v1.2.3, ...

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Switch Games Manager ${{ github.ref_name }}"
          releaseBody: "Xem CHANGELOG để biết thay đổi trong phiên bản này."
          releaseDraft: true   # Tạo draft trước, review rồi mới publish
